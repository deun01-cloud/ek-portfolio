function saveTrade() {
  const ticker = $('#t_ticker').value.trim();
  const side = $('#t_side').value;
  const price = parseFloat($('#t_price').value);
  const qty = parseFloat($('#t_qty').value);
  if (!ticker || !price || !qty) { showStatus('필수값 누락', 'error'); return; }

  const t = {
    id: 'trd_' + Date.now(),
    date: $('#t_date').value,
    accountId: $('#t_account').value,
    ticker,
    name: $('#t_name').value.trim(),
    side,
    price,
    quantity: qty,
    thesis: $('#t_thesis').value.trim(),
    fee: 0,
    tax: 0,
    realizedProfit: null,
  };

  // Calc fee
  const grossAmount = price * qty;
  t.fee = grossAmount * STATE.settings.feeRate;

  // Calc realized profit if sell
  if (side === 'sell') {
    const avgBuy = parseFloat($('#t_avgBuy').value);
    if (avgBuy) {
      const grossProfit = (price - avgBuy) * qty;
      const taxRate = getTaxRate(ticker);
      t.tax = grossProfit > 0 ? grossProfit * taxRate : 0;
      t.realizedProfit = grossProfit - t.tax - t.fee;
    }
    // Reduce holding quantity
    const holding = STATE.holdings.find(h => h.ticker === ticker && h.accountId === t.accountId);
    if (holding) {
      holding.quantity -= qty;
      if (holding.quantity <= 0.0001) {
        STATE.holdings = STATE.holdings.filter(h => h.id !== holding.id);
      }
    }
  } else if (side === 'buy') {
    // Update or create holding
    const holding = STATE.holdings.find(h => h.ticker === ticker && h.accountId === t.accountId);
    if (holding) {
      const totalQty = holding.quantity + qty;
      holding.avgPrice = ((holding.avgPrice * holding.quantity) + (price * qty)) / totalQty;
      holding.quantity = totalQty;
    } else {
      STATE.holdings.push({
        id: 'hld_' + Date.now(),
        ticker, name: t.name,
        accountId: t.accountId,
        sector: '',
        quantity: qty, avgPrice: price,
        targetPrice: null, stopPrice: null,
        thesis: t.thesis,
        addedAt: new Date().toISOString(),
      });
    }
  }

  STATE.trades.push(t);
  saveLocal();
  closeModal();
  renderTab('trades');
  showStatus('✓ 거래 저장됨 (보유종목 자동 갱신)', 'success');
}

function deleteTrade(id) {
  if (!confirm('이 거래를 삭제할까요? (보유종목 정보는 자동 조정되지 않습니다)')) return;
  STATE.trades = STATE.trades.filter(t => t.id !== id);
  saveLocal();
  renderTab('trades');
}

// CSV/EXCEL IMPORT - 증권사 거래내역 자동 임포트
// ============================================================

// CSV 파싱 (UTF-8/EUC-KR 자동 감지)
async function parseCsvFile(file) {
  // xlsx 라이브러리로 처리하면 .xlsx와 .csv 모두 가능 + 인코딩도 자동 처리
  const arrayBuffer = await file.arrayBuffer();
  let workbook;
  try {
    workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true, codepage: 949 });
  } catch (e) {
    // 949 (EUC-KR) 실패 시 기본 UTF-8 시도
    workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
  }
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  // 헤더 자동 감지를 위해 array of arrays로 추출
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
  return rows;
}

// 헤더 행 자동 탐지 (보통 1~10번째 줄 안에 있음)
function detectHeaderRow(rows) {
  const KEYWORDS = ['일자', '날짜', '종목', '구분', '수량', '단가', '체결', '매매', '거래', '입금', '출금', '잔액', '예수금'];
  let bestRow = 0, bestScore = 0;
  for (let i = 0; i < Math.min(rows.length, 15); i++) {
    const row = rows[i];
    if (!row) continue;
    let score = 0;
    row.forEach(cell => {
      const s = String(cell || '');
      KEYWORDS.forEach(k => { if (s.includes(k)) score++; });
    });
    if (score > bestScore) { bestScore = score; bestRow = i; }
  }
  return bestScore >= 2 ? bestRow : -1; // 최소 2개 키워드 매치 시
}

// 컬럼명 → 의미 매핑 (퍼지 매칭)
function mapColumns(headers) {
  const map = {};
  headers.forEach((h, idx) => {
    const s = String(h || '').replace(/\s/g, '');
    // 날짜
    if (!map.date && /일자|날짜|약정일|매매일|체결일|거래일/.test(s)) map.date = idx;
    // 종목명
    else if (!map.name && /(종목명|상품명|종목$|품목)/.test(s) && !/코드/.test(s)) map.name = idx;
    // 종목코드
    else if (!map.ticker && /(종목코드|코드|티커)/.test(s)) map.ticker = idx;
    // 매수/매도 구분
    else if (!map.side && /(매매구분|거래구분|구분|매수매도|적요|거래종류|거래내용)/.test(s)) map.side = idx;
    // 수량
    else if (!map.quantity && /(체결수량|약정수량|수량|주수)/.test(s)) map.quantity = idx;
    // 가격
    else if (!map.price && /(체결단가|체결가|단가|가격|평균가|체결금액|약정단가)/.test(s)) map.price = idx;
    // 금액 (대안)
    else if (!map.amount && /(거래금액|약정금액|체결금액|매매금액|총금액)/.test(s)) map.amount = idx;
    // 수수료
    else if (!map.fee && /(수수료)/.test(s)) map.fee = idx;
    // 세금
    else if (!map.tax && /(세금|거래세|제세금)/.test(s)) map.tax = idx;
    // 정산금액 (입출금 표시 용)
    else if (!map.netAmount && /(정산금액|결제금액|입금액|출금액)/.test(s)) map.netAmount = idx;
    // 예수금 잔액
    else if (!map.balance && /(예수금잔액|예수금|잔액|잔고)/.test(s)) map.balance = idx;
  });
  return map;
}

// 텍스트 → 거래 종류 분류
function classifyTransaction(text) {
  const t = String(text || '').replace(/\s/g, '');
  if (!t) return 'unknown';
  // 출금이 매도보다 우선 (매도대금 출금 같은 경우 처리)
  if (/매수|현금매수|신규매수|주식매수|장내매수/.test(t)) return 'buy';
  if (/매도|현금매도|신규매도|주식매도|장내매도/.test(t)) return 'sell';
  if (/배당/.test(t)) return 'dividend';
  if (/입금/.test(t)) return 'deposit';
  if (/출금/.test(t)) return 'withdraw';
  if (/이체/.test(t)) return 'transfer';
  return 'unknown';
}

// 종목코드 정규화 (한국 6자리 → .KS/.KQ 자동 추가)
// KOSDAQ 주요 종목 (코드 시작 패턴으로 일부만 추정 가능 — 정확성 위해 알려진 KOSDAQ 종목 명시)
const KOSDAQ_TICKERS = new Set([
  '091990','068270','000660','035720','035420','036570','058470',
  '042700','041510','039030','048410','053800','067160','086520',
  '237690','263750','293490','253450','196170','328130','357780',
  '950140','278280','298540','376300','394800','376190','377300',
  '328130','058820','108860','376190','052020','215600','251270',
  '083450','278470','032500','347890','215000','035900','108860',
  '950130','251970','144510','025900','361610','053610','025980',
]);
function normalizeTicker(code, name) {
  if (!code) return null;
  let c = String(code).trim().replace(/[^0-9A-Za-z.]/g, '');
  if (!c) return null;
  // 이미 형식 정해진 경우 (예: 005930.KS, AAPL)
  if (c.includes('.')) return c.toUpperCase();
  // 알파벳만 → 미국 주식
  if (/^[A-Za-z]+$/.test(c)) return c.toUpperCase();
  // 6자리 숫자 → 한국 종목
  if (/^\d{6}$/.test(c)) {
    return KOSDAQ_TICKERS.has(c) ? c + '.KQ' : c + '.KS';
  }
  return c;
}

// 날짜 문자열 → ISO yyyy-mm-dd
function normalizeDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  let s = String(v).trim();
  // "2024.05.06", "2024-05-06", "2024/05/06", "20240506" 등
  s = s.replace(/[./]/g, '-');
  if (/^\d{8}$/.test(s)) {
    s = s.slice(0, 4) + '-' + s.slice(4, 6) + '-' + s.slice(6, 8);
  }
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (!m) return null;
  return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
}

// 숫자 문자열 정규화 (콤마/공백 제거)
function parseNum(v) {
  if (v == null || v === '') return 0;
  if (typeof v === 'number') return v;
  const s = String(v).replace(/[,\s원$]/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// CSV 파일 처리: 행들을 거래 데이터로 변환
function processCsvRows(rows) {
  const headerIdx = detectHeaderRow(rows);
  if (headerIdx < 0) {
    return { error: '헤더 행을 찾을 수 없습니다. 한국 증권사 거래내역 형식인지 확인해주세요.' };
  }
  const headers = rows[headerIdx];
  const colMap = mapColumns(headers);

  if (colMap.date == null) {
    return { error: '날짜 컬럼을 찾을 수 없습니다. (일자/날짜/거래일 등)' };
  }

  const transactions = [];
  const cashFlows = [];   // 입출금 (예수금 변동)
  const errors = [];

  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.every(c => !c || String(c).trim() === '')) continue;
    const date = normalizeDate(row[colMap.date]);
    if (!date) continue;

    const sideText = colMap.side != null ? String(row[colMap.side] || '') : '';
    const kind = classifyTransaction(sideText);
    const name = colMap.name != null ? String(row[colMap.name] || '').trim() : '';
    const tickerRaw = colMap.ticker != null ? row[colMap.ticker] : '';
    const ticker = normalizeTicker(tickerRaw, name);
    const quantity = colMap.quantity != null ? parseNum(row[colMap.quantity]) : 0;
    const price = colMap.price != null ? parseNum(row[colMap.price]) : 0;
    const amount = colMap.amount != null ? parseNum(row[colMap.amount]) : 0;
    const fee = colMap.fee != null ? parseNum(row[colMap.fee]) : 0;
    const tax = colMap.tax != null ? parseNum(row[colMap.tax]) : 0;
    const netAmount = colMap.netAmount != null ? parseNum(row[colMap.netAmount]) : 0;
    const balance = colMap.balance != null ? parseNum(row[colMap.balance]) : null;

    if (kind === 'buy' || kind === 'sell') {
      if (!ticker || !quantity) continue;
      // 단가가 없으면 amount/quantity로 역산
      const finalPrice = price || (amount && quantity ? amount / quantity : 0);
      if (!finalPrice) continue;
      transactions.push({
        date,
        ticker,
        name: name || ticker,
        side: kind,
        price: finalPrice,
        quantity,
        fee,
        tax,
      });
    } else if (kind === 'deposit' || kind === 'withdraw' || kind === 'dividend') {
      const flowAmount = netAmount || amount;
      if (!flowAmount) continue;
      cashFlows.push({
        date,
        kind,
        amount: kind === 'withdraw' ? -Math.abs(flowAmount) : Math.abs(flowAmount),
        balance, // 잔고 스냅샷이 있으면 가장 최근 값 사용
        memo: sideText,
      });
    }
  }

  // 가장 마지막 잔고 (날짜 기준)
  const sortedFlows = [...cashFlows].sort((a, b) => new Date(b.date) - new Date(a.date));
  const latestBalance = sortedFlows.find(f => f.balance != null)?.balance ?? null;
  const latestBalanceDate = sortedFlows.find(f => f.balance != null)?.date ?? null;

  return {
    transactions,
    cashFlows,
    latestBalance,
    latestBalanceDate,
    columnMap: colMap,
    headerRow: headers,
    sampleRowCount: rows.length - headerIdx - 1,
  };
}

        <strong>그 외:</strong><br>
        대부분 증권사 HTS/홈페이지의 거래내역 화면에서 엑셀/CSV 저장 가능합니다.

// 실제 임포트 실행
async function runCsvImport() {
  const accountId = $('#csv_account').value;
  const fileInput = $('#csv_file');
  const file = fileInput.files[0];
  if (!file) { showStatus('파일을 선택하세요', 'error'); return; }
  if (!accountId) { showStatus('계좌를 선택하세요', 'error'); return; }

  showStatus('📂 파일 분석 중...', 'info', false);

  try {
    const rows = await parseCsvFile(file);
    if (!rows.length) { showStatus('빈 파일입니다', 'error'); return; }

    const result = processCsvRows(rows);
    if (result.error) {
      showStatus('⚠ ' + result.error, 'error', false);
      return;
    }

    // 중복 검사 + 신규 거래 추가
    const acc = STATE.accounts.find(a => a.id === accountId);
    let addedTrades = 0, skippedTrades = 0;
    let addedFlows = 0;

    result.transactions.forEach(tx => {
      // 중복 키: 날짜 + 계좌 + 티커 + 수량 + 가격 (정수부)
      const dupKey = `${tx.date}|${accountId}|${tx.ticker}|${tx.side}|${tx.quantity}|${Math.round(tx.price)}`;
      const dup = STATE.trades.find(t =>
        `${t.date}|${t.accountId}|${t.ticker}|${t.side}|${t.quantity}|${Math.round(t.price)}` === dupKey
      );
      if (dup) { skippedTrades++; return; }
      STATE.trades.push({
        id: 'trd_csv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        date: tx.date,
        accountId,
        ticker: tx.ticker,
        name: tx.name,
        side: tx.side,
        price: tx.price,
        quantity: tx.quantity,
        fee: tx.fee,
        tax: tx.tax,
        realizedProfit: null, // 매도 시 보유종목 재계산 단계에서 산출
        thesis: '[CSV 가져오기]',
      });
      addedTrades++;
    });

    // 보유 종목 재계산 (해당 계좌만)
    rebuildHoldingsForAccount(accountId);

    // 예수금 갱신 (가장 최근 잔고가 있으면 그 값으로 업데이트)
    let cashUpdated = false;
    if (result.latestBalance != null && acc) {
      acc.cash = result.latestBalance;
      cashUpdated = true;
    } else if (result.cashFlows.length) {
      // 잔고 스냅샷이 없으면 입출금 누적해서 반영
      const totalFlow = result.cashFlows.reduce((s, f) => s + f.amount, 0);
      acc.cash = (acc.cash || 0) + totalFlow;
      cashUpdated = true;
    }
    addedFlows = result.cashFlows.length;

    saveLocal();
    closeModal();
    renderTab('trades');

    // 변경 내역 토스트
    const summary = [
      addedTrades > 0 ? `매매 +${addedTrades}건` : null,
      skippedTrades > 0 ? `중복 ${skippedTrades}건 건너뜀` : null,
      addedFlows > 0 ? `입출금 ${addedFlows}건 반영` : null,
      cashUpdated ? `예수금 갱신 (${fmtKRW(acc.cash)})` : null,
    ].filter(Boolean).join(' · ');

    if (addedTrades === 0 && addedFlows === 0) {
      showStatus(`ℹ 새로 추가된 내역 없음 (모두 중복)`, 'info', false);
    } else {
      showStatus(`✓ 가져오기 완료 — ${summary}`, 'success', false);
    }
  } catch (e) {
    console.error(e);
    showStatus('⚠ 파일 처리 실패: ' + e.message, 'error', false);
  }
}

// 특정 계좌의 보유종목을 거래내역으로 재계산
function rebuildHoldingsForAccount(accountId) {
  // 1) 해당 계좌의 모든 거래를 시간순 정렬
  const trades = STATE.trades
    .filter(t => t.accountId === accountId)
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  // 2) 종목별 누적 수량/평단가/실현손익 계산
  const positions = {};
  trades.forEach(t => {
    if (!positions[t.ticker]) {
      positions[t.ticker] = { qty: 0, avgPrice: 0, name: t.name, realizedTotal: 0 };
    }
    const p = positions[t.ticker];
    if (t.side === 'buy') {
      const newQty = p.qty + t.quantity;
      if (newQty > 0) {
        p.avgPrice = (p.avgPrice * p.qty + t.price * t.quantity) / newQty;
      }
      p.qty = newQty;
      p.name = t.name || p.name;
    } else if (t.side === 'sell') {
      // 실현손익 계산 (세후)
      if (p.qty > 0 && p.avgPrice > 0) {
        const grossProfit = (t.price - p.avgPrice) * t.quantity;
        const taxRate = getTaxRate(t.ticker);
        const taxAmt = grossProfit > 0 ? grossProfit * taxRate : 0;
        const realized = grossProfit - taxAmt - (t.fee || 0);
        // 거래내역의 realizedProfit/tax도 갱신 (정확한 값으로)
        const tradeRef = STATE.trades.find(x => x.id === t.id);
        if (tradeRef) {
          tradeRef.tax = taxAmt;
          tradeRef.realizedProfit = realized;
        }
        p.realizedTotal += realized;
      }
      p.qty -= t.quantity;
    }
  });

  // 3) 기존 보유종목 중 이 계좌 항목 제거
  STATE.holdings = STATE.holdings.filter(h => h.accountId !== accountId);

  // 4) 양수 수량 보유 종목 다시 등록
  Object.entries(positions).forEach(([ticker, p]) => {
    if (p.qty > 0.0001) {
      // 이미 있던 holding의 추가 정보(target/stop/thesis) 보존을 위해 기존 매칭 시도
      const oldHolding = window._oldHoldingsCache?.find(h => h.accountId === accountId && h.ticker === ticker);
      STATE.holdings.push({
        id: oldHolding?.id || ('hld_csv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6)),
        ticker,
        name: p.name || ticker,
        accountId,
        sector: oldHolding?.sector || STATE.metricsCache[ticker]?.sector || '',
        quantity: p.qty,
        avgPrice: p.avgPrice,
        targetPrice: oldHolding?.targetPrice || null,
        stopPrice: oldHolding?.stopPrice || null,
        thesis: oldHolding?.thesis || '',
        addedAt: oldHolding?.addedAt || new Date().toISOString(),
      });
    }
  });
}

function exportData() {
  const data = JSON.stringify({
    accounts: STATE.accounts,
    holdings: STATE.holdings,
    trades: STATE.trades,
    watchlist: STATE.watchlist,
    snapshots: STATE.snapshots,
    allocationRules: STATE.allocationRules,
    settings: STATE.settings,
    exportedAt: new Date().toISOString(),
  }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ek-asset-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  showStatus('✓ 내보내기 완료', 'success');
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('현재 데이터를 모두 덮어씁니다. 진행할까요?')) return;
      Object.assign(STATE, {
        accounts: data.accounts || [],
        holdings: data.holdings || [],
        trades: data.trades || [],
        watchlist: data.watchlist || [],
        snapshots: data.snapshots || [],
        allocationRules: data.allocationRules || [],
        settings: { ...STATE.settings, ...(data.settings || {}) },
      });
      saveLocal();
      renderTab('settings');
      showStatus('✓ 가져오기 완료', 'success');
    } catch (e) { showStatus('⚠ 파일 읽기 실패: ' + e.message, 'error'); }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm('⚠ 모든 데이터가 삭제됩니다. 계속할까요?')) return;
  if (!confirm('정말로 진행하시겠어요? (마지막 확인)')) return;
  localStorage.removeItem('ekAssetTool');
  location.reload();
}

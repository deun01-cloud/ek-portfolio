<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EK PORTFOLIO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg-primary: #f7f8fa;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f1f3f5;
  --bg-card: #ffffff;
  --border: #e4e7eb;
  --border-light: #cbd5e1;
  --text-primary: #1a202c;
  --text-secondary: #4a5568;
  --text-muted: #94a3b8;
  --accent: #2563eb;
  --accent-dim: #1d4ed8;
  --green: #16a34a;
  --green-dim: #15803d;
  --red: #dc2626;
  --red-dim: #b91c1c;
  --yellow: #d97706;
  --orange: #ea580c;
  --purple: #7c3aed;
  --shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
  --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06);
  --font-display: 'Noto Serif KR', serif;
  --font-body: 'Pretendard', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  font-size: 14px;
  min-height: 100vh;
}

/* === HEADER === */
.app-header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.app-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-title::before {
  content: '◆';
  color: var(--accent);
  font-size: 18px;
}

.header-status {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-secondary);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  display: inline-block;
  margin-right: 6px;
}

.status-dot.online { background: var(--green); box-shadow: 0 0 4px rgba(22,163,74,0.5); }
.status-dot.error { background: var(--red); box-shadow: 0 0 4px rgba(220,38,38,0.5); }

/* === TAB NAVIGATION === */
.tab-nav {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 32px;
  overflow-x: auto;
  scrollbar-width: thin;
}

.tab-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 14px 20px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tab-btn:hover {
  color: var(--text-primary);
  background: var(--bg-tertiary);
}

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-icon {
  font-size: 16px;
  opacity: 0.8;
}

/* === MAIN CONTAINER === */
.main-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px;
}

.tab-content { display: none; animation: fadeIn 0.3s; }
.tab-content.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === SECTIONS & CARDS === */
.section-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-primary);
}

.section-title-bar {
  width: 4px;
  height: 22px;
  background: var(--accent);
  border-radius: 2px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}

.card-header {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-primary);
}

.grid {
  display: grid;
  gap: 16px;
}

.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-4 { grid-template-columns: repeat(4, 1fr); }

@media (max-width: 900px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .main-container { padding: 16px; }
  .app-header { padding: 12px 16px; }
  .tab-nav { padding: 0 16px; }

  /* Compact KPI cards on mobile */
  .grid-4 .stat-card { padding: 10px 8px; }
  .grid-4 .stat-label { font-size: 10px; letter-spacing: 0; line-height: 1.2; }
  .grid-4 .stat-value { font-size: 14px; letter-spacing: -0.5px; word-break: break-all; }
  .grid-4 .stat-change { font-size: 10px; }
  .grid-4 .stat-card::before { width: 2px; }
  /* Hide sparkline on mobile - too narrow */
  .grid-4 .stat-card svg { display: none; }
  .grid-4 .stat-card .flex-between { display: block; }

  /* Owner tabs - horizontal scroll on mobile */
  .owner-tabs { flex-wrap: nowrap; overflow-x: auto; padding: 6px; }
  .owner-tab { flex: 0 0 auto; min-width: 120px; padding: 8px 12px; font-size: 12px; }
  .owner-tab-amount { font-size: 10px; }
}

/* === STATS CARDS === */
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--accent);
}

.stat-card.green::before { background: var(--green); }
.stat-card.red::before { background: var(--red); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.purple::before { background: var(--purple); }

.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: 26px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}

.stat-change {
  font-family: var(--font-mono);
  font-size: 12px;
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.stat-change.up { color: var(--green); }
.stat-change.down { color: var(--red); }
.stat-change.flat { color: var(--text-muted); }

/* === BUTTONS === */
.btn {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 6px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn:hover { background: var(--border); border-color: var(--border-light); }
.btn-primary { background: var(--accent-dim); border-color: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent); }
.btn-success { background: var(--green-dim); border-color: var(--green); color: white; }
.btn-success:hover { background: var(--green); }
.btn-danger { background: var(--red-dim); border-color: var(--red); color: white; }
.btn-danger:hover { background: var(--red); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* === FORMS === */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 500;
}

.form-input, .form-select {
  width: 100%;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 13px;
  transition: border-color 0.15s;
}

.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--accent);
}

.form-input.text { font-family: var(--font-body); }

/* === TABLES === */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.data-table th {
  text-align: left;
  padding: 10px 12px;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
}

.data-table tr:hover { background: var(--bg-tertiary); }
.data-table .text-cell { font-family: var(--font-body); }
.data-table .num-cell { text-align: right; font-variant-numeric: tabular-nums; }

/* === BADGES & TAGS === */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
}

.badge-green { background: #dcfce7; color: #15803d; }
.badge-red { background: #fee2e2; color: #b91c1c; }
.badge-yellow { background: #fef3c7; color: #b45309; }
.badge-blue { background: #dbeafe; color: #1d4ed8; }
.badge-purple { background: #ede9fe; color: #6d28d9; }
.badge-gray { background: #f1f5f9; color: #475569; }

/* === PROGRESS BARS === */
.progress {
  width: 100%;
  height: 8px;
  background: var(--bg-primary);
  border-radius: 4px;
  overflow: hidden;
  margin: 8px 0;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.3s ease;
}

.progress-bar.green { background: var(--green); }
.progress-bar.red { background: var(--red); }
.progress-bar.yellow { background: var(--yellow); }

/* === ALERTS / NOTIFICATIONS === */
.alert {
  padding: 12px 16px;
  border-radius: 6px;
  margin-bottom: 12px;
  border-left: 3px solid var(--accent);
  background: #eff6ff;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.alert.success { border-color: var(--green); background: #f0fdf4; }
.alert.warning { border-color: var(--yellow); background: #fffbeb; }
.alert.danger { border-color: var(--red); background: #fef2f2; }

/* === MODAL === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  max-width: 600px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.modal-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
}

.modal-close:hover { color: var(--text-primary); }

/* === DONUT/CHART === */
.donut-container {
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.donut-svg {
  width: 180px;
  height: 180px;
  flex-shrink: 0;
}

.donut-legend {
  flex: 1;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

.legend-label { color: var(--text-secondary); flex: 1; }
.legend-value { font-family: var(--font-mono); color: var(--text-primary); font-weight: 600; }

/* === MISC === */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state-icon { font-size: 36px; opacity: 0.5; margin-bottom: 12px; }

.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-end { display: flex; justify-content: flex-end; gap: 8px; }
.flex-gap { gap: 12px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.text-mono { font-family: var(--font-mono); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-muted { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.text-right { text-align: right; }
.text-center { text-align: center; }

.show-mobile { display: none; }
.hide-mobile { display: inline; }
@media (max-width: 900px) {
  .show-mobile { display: inline; }
  .hide-mobile { display: none; }
}

.score-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-weight: 700;
  border: 3px solid;
}

.score-circle .score-num { font-size: 24px; line-height: 1; }
.score-circle .score-label { font-size: 9px; opacity: 0.7; margin-top: 2px; }

.score-circle.high { border-color: var(--green); color: var(--green); }
.score-circle.mid { border-color: var(--yellow); color: var(--yellow); }
.score-circle.low { border-color: var(--red); color: var(--red); }

/* === Owner Filter Tabs (Dashboard) === */
.owner-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 8px;
  background: var(--bg-tertiary);
  border-radius: 10px;
  border: 1px solid var(--border);
}

.owner-tab {
  flex: 1;
  min-width: 130px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 10px 14px;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  text-align: left;
}

.owner-tab:hover {
  background: var(--bg-card);
  border-color: var(--border-light);
  color: var(--text-primary);
}

.owner-tab.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent-dim);
  box-shadow: 0 2px 6px rgba(37,99,235,0.25);
}

.owner-tab.active .owner-tab-amount { color: rgba(255,255,255,0.9); }

.owner-tab-amount {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
}

/* === Trend Range Toggle === */
.trend-range-toggle {
  display: inline-flex;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px;
  gap: 2px;
}

.trend-range-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: 4px;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}

.trend-range-btn:hover { color: var(--text-primary); background: var(--bg-card); }

.trend-range-btn.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 1px 3px rgba(37,99,235,0.3);
}

/* === Collapsible Alerts Panel === */
.alerts-panel {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.alerts-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  transition: background 0.15s;
}

.alerts-summary:hover { background: #fef3c7; }

.alerts-summary-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.alerts-summary-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.alerts-icon {
  font-size: 16px;
  color: var(--yellow);
}

.alerts-toggle {
  font-size: 11px;
  color: var(--text-muted);
  width: 16px;
  text-align: center;
}

.alerts-list {
  border-top: 1px solid #fde68a;
  background: var(--bg-card);
  max-height: 320px;
  overflow-y: auto;
}

.alert-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  border-left: 3px solid var(--yellow);
}

.alert-item:last-child { border-bottom: none; }
.alert-item.success { border-left-color: var(--green); background: #f0fdf4; }
.alert-item.danger { border-left-color: var(--red); background: #fef2f2; }
.alert-item.warning { border-left-color: var(--yellow); background: #fffbeb; }

.alert-item-content {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.alert-dismiss {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 26px;
  height: 26px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  padding: 0;
  line-height: 1;
}

.alert-dismiss:hover {
  background: var(--red);
  color: white;
  border-color: var(--red);
}

/* === Watchlist Card Grid === */
.watchlist-empty {
  text-align: center;
  padding: 24px;
  background: var(--bg-tertiary);
  border-radius: 6px;
}

.watchlist-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

@media (max-width: 1100px) {
  .watchlist-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 800px) {
  .watchlist-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 500px) {
  .watchlist-grid { grid-template-columns: 1fr; }
}

.watchlist-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.watchlist-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 4px 8px rgba(37,99,235,0.12);
}

.watchlist-card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 6px;
}

.watchlist-name {
  font-weight: 700;
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.3;
}

.watchlist-remove {
  background: transparent;
  border: none;
  color: var(--text-muted);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 0;
  line-height: 1;
}

.watchlist-remove:hover { background: var(--red); color: white; }

.watchlist-ticker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3px;
}

.watchlist-score {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-top: 4px;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}

.watchlist-score-num {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -1px;

  <div class="modal" id="modalBox"></div>

<div id="statusBar"></div>

<script>
/* ============================================================
   EK PORTFOLIO - Asset Management Tool
   Single-file HTML app, vanilla JS
   ============================================================ */

// ===== STATE =====
const STATE = {
  accounts: [],
  holdings: [],
  trades: [],
  watchlist: [],
  snapshots: [],
  allocationRules: [],
  settings: {
    proxyUrl: '',
    notionToken: '',
    dbAccounts: '',
    dbHoldings: '',
    dbTrades: '',
    dbWatchlist: '',
    dbSnapshots: '',
    dbAllocation: '',
    taxKR: 0.22,    // 한국 양도세 (대주주 22%, 기본 0)
    taxUS: 0.22,    // 미국 양도세 22%
    taxDividend: 0.154, // 배당소득세 15.4%
    feeRate: 0.00015,   // 거래수수료 0.015%
    benchmarkKR: '^KS11',
    benchmarkUS: '^GSPC',
    usdKrw: 1380, // USD/KRW 환율 (자산 합산용)
    customCompare: {}, // {ticker: [comparisons]}
  },
  currentAccountFilter: 'all',
  currentOwnerFilter: 'all',  // 대시보드 사람별 필터
  currentTrendRange: '1M',     // 자산 추이 기간: 1M, 3M, 6M, 1Y, ALL
  watchlistStatusFilter: 'all', // 관심종목 status 필터
  dismissedAlerts: [],         // 닫은 알림 ID 목록 (편차 변하면 새 ID로 다시 나타남)
  alertsCollapsed: false,      // 대시보드 알림 패널 접힘 상태
  priceCache: {},
  metricsCache: {},
};

// ===== UTILITIES =====
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function fmt(n, opts = {}) {
  if (n == null || isNaN(n)) return '—';
  const { decimals = 0, prefix = '', suffix = '', sign = false } = opts;
  const sign_ = sign && n > 0 ? '+' : '';
  return sign_ + prefix + Number(n).toLocaleString('ko-KR', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  }) + suffix;
}

function fmtKRW(n) { return fmt(n, { suffix: '원' }); }
function fmtKRWShort(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e12) return sign + (abs / 1e12).toFixed(2) + '조원';
  if (abs >= 1e8)  return sign + (abs / 1e8).toFixed(2) + '억원';
  if (abs >= 1e4)  return sign + (abs / 1e4).toFixed(0) + '만원';
  return sign + Math.round(abs).toLocaleString('ko-KR') + '원';
}
function fmtPct(n, sign = false) { return fmt(n, { decimals: 2, suffix: '%', sign }); }
function fmtNum(n, d = 2) { return fmt(n, { decimals: d }); }

function showStatus(msg, type = 'info', autoHide = true) {
  const bar = $('#statusBar');
  bar.textContent = msg;
  bar.className = 'active ' + type;
  if (autoHide) setTimeout(() => bar.classList.remove('active'), 4000);
}

function openModal(html) {
  $('#modalBox').innerHTML = html;
  $('#modalOverlay').classList.add('active');
}
function closeModal() { $('#modalOverlay').classList.remove('active'); }
$('#modalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'modalOverlay') closeModal();
});

// ===== TAB SWITCHING =====
$$('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.tab-btn').forEach(b => b.classList.remove('active'));
    $$('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const tabId = btn.dataset.tab;
    $('#tab-' + tabId).classList.add('active');
    renderTab(tabId);
  });
});

// ===== LOCALSTORAGE =====
function saveLocal() {
  localStorage.setItem('ekAssetTool', JSON.stringify({
    accounts: STATE.accounts,
    holdings: STATE.holdings,
    trades: STATE.trades,
    watchlist: STATE.watchlist,
    snapshots: STATE.snapshots,
    allocationRules: STATE.allocationRules,
    dismissedAlerts: STATE.dismissedAlerts,
    settings: STATE.settings,
  }));
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('ekAssetTool');
    if (!raw) return;
    const obj = JSON.parse(raw);
    Object.assign(STATE, obj);
    // 옛 데이터 호환: 누락된 배열 필드 기본값 보장
    if (!Array.isArray(STATE.dismissedAlerts)) STATE.dismissedAlerts = [];
  } catch (e) { console.error('localStorage load failed', e); }
}

// ===== GLOBAL ERROR HANDLER =====
window.addEventListener('error', (e) => {
  showStatus('⚠ ' + (e.message || 'Unknown error'), 'error', false);
  console.error('Global error:', e);
});

window.addEventListener('unhandledrejection', (e) => {
  showStatus('⚠ ' + (e.reason?.message || 'Promise rejection'), 'error', false);
  console.error('Promise rejection:', e);
});

// ============================================================
// MAIN RENDER ROUTER
// ============================================================
function renderTab(tabId) {
  const fn = {
    dashboard: renderDashboard,
    accounts: renderAccounts,
    portfolio: renderPortfolio,
    quant: renderQuant,
    trades: renderTrades,
    settings: renderSettings,
  }[tabId];
  if (fn) fn();
}

// ============================================================
// API LAYER - Yahoo Finance via Proxy
// ============================================================
async function fetchPrice(ticker) {
  if (STATE.priceCache[ticker] && Date.now() - STATE.priceCache[ticker]._ts < 60000) {
    return STATE.priceCache[ticker];
  }
  const proxy = STATE.settings.proxyUrl;
  if (!proxy) throw new Error('프록시 URL이 설정되지 않았습니다 (설정 탭)');
  try {
    const url = `${proxy}/yahoo/chart/${encodeURIComponent(ticker)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('시세 조회 실패: ' + ticker);
    const data = await res.json();
    const result = data.chart?.result?.[0];
    if (!result) throw new Error('데이터 없음: ' + ticker);
    const meta = result.meta || {};
    const info = {
      ticker,
      price: meta.regularMarketPrice,
      prevClose: meta.previousClose || meta.chartPreviousClose,
      currency: meta.currency,
      symbol: meta.symbol,
      exchangeName: meta.exchangeName,
      _ts: Date.now(),
    };
    STATE.priceCache[ticker] = info;
    return info;
  } catch (e) {
    $('#yahooStatus').className = 'status-dot error';
    throw e;
  }
}

async function fetchMetrics(ticker) {
  if (STATE.metricsCache[ticker] && Date.now() - STATE.metricsCache[ticker]._ts < 3600000) {
    return STATE.metricsCache[ticker];
  }
  const proxy = STATE.settings.proxyUrl;
  if (!proxy) throw new Error('프록시 URL이 설정되지 않았습니다');
  try {
    const url = `${proxy}/yahoo/quoteSummary/${encodeURIComponent(ticker)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('지표 조회 실패');
    const data = await res.json();
    const result = data.quoteSummary?.result?.[0];
    if (!result) throw new Error('지표 데이터 없음');
    const sd = result.summaryDetail || {};
    const ks = result.defaultKeyStatistics || {};
    const fd = result.financialData || {};
    const ap = result.assetProfile || {};
    const info = {
      ticker,
      name: result.price?.longName || result.price?.shortName || ticker,
      sector: ap.sector || '—',
      industry: ap.industry || '—',
      country: ap.country || '—',
      per: sd.trailingPE?.raw ?? ks.trailingPE?.raw,
      forwardPER: sd.forwardPE?.raw ?? ks.forwardPE?.raw,
      pbr: ks.priceToBook?.raw,
      eps: ks.trailingEps?.raw,
      epsGrowth: ks.earningsQuarterlyGrowth?.raw,
      roe: fd.returnOnEquity?.raw,
      roa: fd.returnOnAssets?.raw,
      operatingMargin: fd.operatingMargins?.raw,
      profitMargin: fd.profitMargins?.raw,
      grossMargin: fd.grossMargins?.raw,
      debtToEquity: fd.debtToEquity?.raw,
      currentRatio: fd.currentRatio?.raw,
      dividendYield: sd.dividendYield?.raw,
      marketCap: sd.marketCap?.raw || ks.marketCap?.raw,
      _ts: Date.now(),
    };
    STATE.metricsCache[ticker] = info;
    return info;
  } catch (e) {
    $('#yahooStatus').className = 'status-dot error';
    throw e;
  }
}

// ============================================================
// CALCULATION HELPERS
// ============================================================
function getFxRate(ticker) {
  // Convert foreign currency to KRW for unified totals
  if (isUSStock(ticker)) return STATE.settings.usdKrw || 1380;
  return 1;
}

function getCurrentValue(holding) {
  const price = STATE.priceCache[holding.ticker]?.price;
  if (!price) return null;
  return price * holding.quantity * getFxRate(holding.ticker);
}

function getProfit(holding) {
  const value = getCurrentValue(holding);
  if (value == null) return null;
  const fx = getFxRate(holding.ticker);
  return value - (holding.avgPrice * holding.quantity * fx);
}

function getProfitRate(holding) {
  const price = STATE.priceCache[holding.ticker]?.price;
  if (!price) return null;
  return (price - holding.avgPrice) / holding.avgPrice * 100;
}

function isUSStock(ticker) {
  return !ticker.includes('.KS') && !ticker.includes('.KQ');
}

function getTaxRate(ticker) {
  return isUSStock(ticker) ? STATE.settings.taxUS : STATE.settings.taxKR;
}

function totalAssets(accountId = null) {
  let total = 0;
  STATE.accounts.forEach(acc => {
    if (accountId && acc.id !== accountId) return;
    total += acc.cash || 0;
  });
  STATE.holdings.forEach(h => {
    if (accountId && h.accountId !== accountId) return;
    const v = getCurrentValue(h);
    if (v != null) total += v;
  });
  return total;
}

// Owner 기준 필터링 - 대시보드용
function getFilteredAccounts() {
  const owner = STATE.currentOwnerFilter;
  if (!owner || owner === 'all') return STATE.accounts;
  return STATE.accounts.filter(a => (a.owner || '') === owner);
}

function getFilteredHoldings() {
  const filteredAccs = getFilteredAccounts();
  const accIds = new Set(filteredAccs.map(a => a.id));
  return STATE.holdings.filter(h => accIds.has(h.accountId));
}

function totalAssetsFiltered() {
  let total = 0;
  getFilteredAccounts().forEach(acc => { total += acc.cash || 0; });
  getFilteredHoldings().forEach(h => {
    const v = getCurrentValue(h);
    if (v != null) total += v;
  });
  return total;
}

// 모든 등록된 owner 목록 (탭 생성용)
function getAllOwners() {
  return [...new Set(STATE.accounts.map(a => a.owner).filter(Boolean))];
}

function getChangeRate(currentVal, prevDays = 1) {
  if (!STATE.snapshots.length) return null;
  const now = Date.now();
  const targetTime = now - prevDays * 24 * 60 * 60 * 1000;
  const sorted = [...STATE.snapshots].sort((a, b) => Math.abs(new Date(a.date).getTime() - targetTime) - Math.abs(new Date(b.date).getTime() - targetTime));
  if (!sorted.length) return null;
  const prev = sorted[0].total;
  if (!prev) return null;
  return (currentVal - prev) / prev * 100;
}

async function refreshAllPrices() {
  const tickers = [...new Set(STATE.holdings.map(h => h.ticker))];
  if (!tickers.length) return;
  showStatus(`📈 시세 갱신 중... (${tickers.length}개 종목)`, 'info', false);
  let ok = 0, fail = 0;
  await Promise.all(tickers.map(async t => {
    try { await fetchPrice(t); ok++; }
    catch (e) { fail++; console.error('Price fetch failed:', t, e); }
  }));
  $('#yahooStatus').className = fail === 0 ? 'status-dot online' : 'status-dot error';
  $('#lastUpdate').textContent = '갱신: ' + new Date().toLocaleTimeString('ko-KR');
  showStatus(`✓ 시세 갱신 완료 (성공 ${ok} / 실패 ${fail})`, fail === 0 ? 'success' : 'error');
  // Save snapshot
  saveSnapshot();
}

function saveSnapshot() {
  const total = totalAssets();
  if (!total) return;
  const today = new Date().toISOString().slice(0, 10);
  const idx = STATE.snapshots.findIndex(s => s.date === today);
  const snap = { date: today, total, ts: Date.now() };
  if (idx >= 0) STATE.snapshots[idx] = snap;
  else STATE.snapshots.push(snap);
  // Keep only last 365 days
  STATE.snapshots = STATE.snapshots.slice(-365);
  saveLocal();
}

// ============================================================
// QUANT - Piotroski F-Score (simplified)
// ============================================================
function calcFScore(metrics) {
  let score = 0;
  const checks = [];
  // 1. ROA > 0
  if (metrics.roa > 0) { score++; checks.push({ name: 'ROA > 0', pass: true }); }
  else checks.push({ name: 'ROA > 0', pass: false });
  // 2. Operating Margin > 0
  if (metrics.operatingMargin > 0) { score++; checks.push({ name: '영업이익률 > 0', pass: true }); }
  else checks.push({ name: '영업이익률 > 0', pass: false });
  // 3. Profit Margin > 0
  if (metrics.profitMargin > 0) { score++; checks.push({ name: '순이익률 > 0', pass: true }); }
  else checks.push({ name: '순이익률 > 0', pass: false });
  // 4. ROE > 8%
  if (metrics.roe > 0.08) { score++; checks.push({ name: 'ROE > 8%', pass: true }); }
  else checks.push({ name: 'ROE > 8%', pass: false });
  // 5. Debt/Equity < 100
  if (metrics.debtToEquity != null && metrics.debtToEquity < 100) { score++; checks.push({ name: '부채비율 < 100%', pass: true }); }
  else checks.push({ name: '부채비율 < 100%', pass: false });
  // 6. Current Ratio > 1
  if (metrics.currentRatio > 1) { score++; checks.push({ name: '유동비율 > 100%', pass: true }); }
  else checks.push({ name: '유동비율 > 100%', pass: false });
  // 7. Gross Margin > 20%
  if (metrics.grossMargin > 0.2) { score++; checks.push({ name: '매출총이익률 > 20%', pass: true }); }
  else checks.push({ name: '매출총이익률 > 20%', pass: false });
  // 8. PER > 0 (positive earnings)
  if (metrics.per > 0) { score++; checks.push({ name: '흑자 (PER > 0)', pass: true }); }
  else checks.push({ name: '흑자 (PER > 0)', pass: false });
  // 9. EPS Growth > 0
  if (metrics.epsGrowth > 0) { score++; checks.push({ name: 'EPS 성장 (+)', pass: true }); }
  else checks.push({ name: 'EPS 성장 (+)', pass: false });

  return { score, max: 9, checks };
}

function getScoreClass(score, max = 9) {
  const pct = score / max;
  if (pct >= 0.7) return 'high';
  if (pct >= 0.4) return 'mid';
  return 'low';
}

function getScoreLabel(score, max = 9) {
  const pct = score / max;
  if (pct >= 0.7) return '🟢 우량';
  if (pct >= 0.4) return '🟡 보통';
  return '🔴 부진';
}

// ============================================================
// DONUT CHART (SVG)
// ============================================================
function renderDonut(data, colors) {
  if (!data.length) return '<div class="text-muted text-center">데이터 없음</div>';
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return '<div class="text-muted text-center">데이터 없음</div>';
  const cx = 90, cy = 90, r = 70, strokeW = 26;
  const C = 2 * Math.PI * r;
  let offset = 0;
  const segments = data.map((d, i) => {
    const pct = d.value / total;
    const len = pct * C;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
      stroke="${colors[i % colors.length]}" stroke-width="${strokeW}"
      stroke-dasharray="${len} ${C - len}" stroke-dashoffset="${-offset}"
      transform="rotate(-90 ${cx} ${cy})" />`;
    offset += len;
    return seg;
  }).join('');

  const legend = data.map((d, i) => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${colors[i % colors.length]}"></span>
      <span class="legend-label">${d.label}</span>
      <span class="legend-value">${fmtPct((d.value / total) * 100)}</span>
    </div>
  `).join('');

  return `
    <div class="donut-container">
      <svg class="donut-svg" viewBox="0 0 180 180">
        ${segments}

const PALETTE = ['#2563eb', '#16a34a', '#d97706', '#7c3aed', '#dc2626', '#ea580c', '#0891b2', '#db2777', '#9333ea', '#65a30d'];

// ============================================================
// CHART HELPERS - SVG-based charts
// ============================================================

// Line chart for asset trend
function renderLineChart(data, opts = {}) {
  const { width = 760, height = 240, color = '#2563eb', fillColor = 'rgba(37,99,235,0.12)', showArea = true, yLabel = '', formatY = (v) => v.toLocaleString() } = opts;
  if (!data.length) return `<div class="empty-state" style="padding:40px"><div class="text-muted">데이터 없음 (시세를 갱신하면 일별 스냅샷이 누적됩니다)</div></div>`;
  if (data.length === 1) {
    // Single point - show as horizontal line
    data = [{ ...data[0] }, { ...data[0], x: data[0].x + 1 }];
  }

  const padL = 60, padR = 20, padT = 20, padB = 40;
  const chartW = width - padL - padR;
  const chartH = height - padT - padB;

  const xs = data.map(d => d.x);
  const ys = data.map(d => d.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const yRange = yMax - yMin || 1;
  const yPad = yRange * 0.1;

  const sx = (x) => padL + ((x - xMin) / (xMax - xMin || 1)) * chartW;
  const sy = (y) => padT + chartH - ((y - (yMin - yPad)) / (yRange + yPad * 2)) * chartH;

  // Path
  const path = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${sx(d.x)} ${sy(d.y)}`).join(' ');
  // Fill area
  const areaPath = `${path} L ${sx(xMax)} ${padT + chartH} L ${sx(xMin)} ${padT + chartH} Z`;

  // Y-axis ticks (5 lines)
  const ticks = [];
  for (let i = 0; i <= 4; i++) {
    const v = (yMin - yPad) + (yRange + yPad * 2) * (i / 4);
    const py = padT + chartH - (i / 4) * chartH;
    ticks.push(`<line x1="${padL}" y1="${py}" x2="${width - padR}" y2="${py}" stroke="var(--border)" stroke-dasharray="2,3" />
      <text x="${padL - 8}" y="${py + 4}" text-anchor="end" fill="var(--text-muted)" font-size="10" font-family="JetBrains Mono">${formatY(v)}</text>`);
  }

  // X-axis labels (start, mid, end)
  const xLabels = [data[0], data[Math.floor(data.length / 2)], data[data.length - 1]].map(d => `
    <text x="${sx(d.x)}" y="${height - padB + 18}" text-anchor="middle" fill="var(--text-muted)" font-size="10" font-family="JetBrains Mono">${d.label || ''}</text>`).join('');

  // Data points (small dots)
  const dots = data.map(d => `<circle cx="${sx(d.x)}" cy="${sy(d.y)}" r="3" fill="${color}" stroke="var(--bg-card)" stroke-width="1" />`).join('');

  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
      ${ticks.join('')}
      ${showArea ? `<path d="${areaPath}" fill="${fillColor}" />` : ''}
      <path d="${path}" stroke="${color}" stroke-width="2" fill="none" stroke-linejoin="round" />
      ${dots}
      ${xLabels}
    </svg>
  `;
}

// Multi-series line chart for benchmark comparison
function renderMultiLineChart(series, opts = {}) {
  const { width = 760, height = 280 } = opts;
  if (!series.length || !series[0].data.length) return '<div class="empty-state" style="padding:40px"><div class="text-muted">데이터 없음</div></div>';

  const padL = 50, padR = 100, padT = 20, padB = 40;
  const chartW = width - padL - padR;
  const chartH = height - padT - padB;

  // Normalize all series to start at 100 (relative performance)
  const normalized = series.map(s => {
    const base = s.data[0].y;
    return {
      ...s,
      data: s.data.map(d => ({ ...d, y: (d.y / base) * 100 })),
    };
  });

  const allYs = normalized.flatMap(s => s.data.map(d => d.y));
  const allXs = normalized[0].data.map(d => d.x);
  const xMin = Math.min(...allXs), xMax = Math.max(...allXs);
  const yMin = Math.min(...allYs), yMax = Math.max(...allYs);
  const yRange = (yMax - yMin) || 1;
  const yPad = yRange * 0.1;

  const sx = (x) => padL + ((x - xMin) / (xMax - xMin || 1)) * chartW;
  const sy = (y) => padT + chartH - ((y - (yMin - yPad)) / (yRange + yPad * 2)) * chartH;

  // Y-axis (% labels)
  const yTicks = [];
  for (let i = 0; i <= 4; i++) {
    const v = (yMin - yPad) + (yRange + yPad * 2) * (i / 4);
    const py = padT + chartH - (i / 4) * chartH;
    yTicks.push(`<line x1="${padL}" y1="${py}" x2="${width - padR}" y2="${py}" stroke="var(--border)" stroke-dasharray="2,3" />
      <text x="${padL - 6}" y="${py + 4}" text-anchor="end" fill="var(--text-muted)" font-size="10" font-family="JetBrains Mono">${v.toFixed(1)}</text>`);
  }

  // 100 base line
  const baseY = sy(100);
  yTicks.push(`<line x1="${padL}" y1="${baseY}" x2="${width - padR}" y2="${baseY}" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />`);

  // Series paths and legend
  const paths = normalized.map(s => {
    const path = s.data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${sx(d.x)} ${sy(d.y)}`).join(' ');
    const lastPoint = s.data[s.data.length - 1];
    const lastVal = lastPoint.y;
    return {
      path: `<path d="${path}" stroke="${s.color}" stroke-width="2" fill="none" stroke-linejoin="round" />`,
      label: `<text x="${width - padR + 8}" y="${sy(lastVal) + 4}" fill="${s.color}" font-size="11" font-weight="600" font-family="JetBrains Mono">${s.label} ${lastVal.toFixed(1)}</text>`,
    };
  });

  // X axis labels
  const firstD = normalized[0].data[0];
  const lastD = normalized[0].data[normalized[0].data.length - 1];
  const midIdx = Math.floor(normalized[0].data.length / 2);
  const midD = normalized[0].data[midIdx];
  const xLabels = `
    <text x="${sx(firstD.x)}" y="${height - padB + 18}" text-anchor="start" fill="var(--text-muted)" font-size="10" font-family="JetBrains Mono">${firstD.label || ''}</text>
    <text x="${sx(midD.x)}" y="${height - padB + 18}" text-anchor="middle" fill="var(--text-muted)" font-size="10" font-family="JetBrains Mono">${midD.label || ''}</text>
    <text x="${sx(lastD.x)}" y="${height - padB + 18}" text-anchor="end" fill="var(--text-muted)" font-size="10" font-family="JetBrains Mono">${lastD.label || ''}</text>
  `;

  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
      ${yTicks.join('')}
      ${paths.map(p => p.path).join('')}
      ${paths.map(p => p.label).join('')}
      ${xLabels}
      <text x="${padL}" y="12" fill="var(--text-muted)" font-size="9" font-family="JetBrains Mono">기준 100 (시작 시점 = 100)</text>
    </svg>
  `;
}

// Horizontal bar chart for top/worst returns
function renderBarChart(data, opts = {}) {
  const { width = 380, height = 240, max = null } = opts;
  if (!data.length) return '<div class="empty-state" style="padding:30px"><div class="text-muted">데이터 없음</div></div>';

  const barH = 22;
  const gap = 8;
  const labelW = 110;
  const padL = labelW + 10, padR = 70, padT = 10;
  const chartH = data.length * (barH + gap);

  const absMax = max || Math.max(...data.map(d => Math.abs(d.value)));
  const centerX = padL + (width - padL - padR) / 2;
  const halfW = (width - padL - padR) / 2;

  const bars = data.map((d, i) => {
    const y = padT + i * (barH + gap);
    const barLen = (Math.abs(d.value) / absMax) * halfW;
    const isPos = d.value >= 0;
    const x = isPos ? centerX : centerX - barLen;
    const color = isPos ? 'var(--green)' : 'var(--red)';
    const colorBg = isPos ? 'rgba(22,163,74,0.15)' : 'rgba(220,38,38,0.15)';
    return `
      <text x="${labelW}" y="${y + barH * 0.7}" text-anchor="end" fill="var(--text-primary)" font-size="11" font-family="Pretendard">${(d.label || '').length > 10 ? (d.label || '').slice(0, 10) + '…' : (d.label || '')}</text>
      <rect x="${x}" y="${y}" width="${barLen}" height="${barH}" fill="${colorBg}" rx="3"/>
      <rect x="${x}" y="${y}" width="${barLen}" height="${barH}" fill="${color}" rx="3" opacity="0.85"/>
      <text x="${isPos ? x + barLen + 5 : x - 5}" y="${y + barH * 0.7}" text-anchor="${isPos ? 'start' : 'end'}" fill="${color}" font-size="11" font-weight="600" font-family="JetBrains Mono">${d.value > 0 ? '+' : ''}${d.value.toFixed(2)}%</text>
    `;
  }).join('');

  return `
    <svg viewBox="0 0 ${width} ${chartH + padT + 10}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
      <line x1="${centerX}" y1="${padT}" x2="${centerX}" y2="${chartH + padT}" stroke="var(--border)" stroke-width="1"/>
      ${bars}
    </svg>
  `;
}

// Allocation gauge bars (target vs actual)
function renderAllocationBars(rules, total) {
  if (!rules.length) return '<div class="empty-state" style="padding:30px"><div class="text-muted">설정된 룰이 없습니다. <br><span style="font-size:11px">자산 배분 탭에서 추가하세요</span></div></div>';

  const items = rules.map(rule => {
    let actual = 0;
    if (rule.type === 'sector') {
      STATE.holdings.forEach(h => {
        const sec = STATE.metricsCache[h.ticker]?.sector || h.sector;
        if (sec === rule.target) actual += getCurrentValue(h) || 0;
      });
    } else if (rule.type === 'account') {
      const acc = STATE.accounts.find(a => a.id === rule.target);
      if (acc) actual = (acc.cash || 0) + STATE.holdings.filter(h => h.accountId === acc.id).reduce((s, h) => s + (getCurrentValue(h) || 0), 0);
    } else if (rule.type === 'ticker') {
      STATE.holdings.forEach(h => { if (h.ticker === rule.target) actual += getCurrentValue(h) || 0; });
    }
    const actualPct = total > 0 ? (actual / total) * 100 : 0;
    const diff = actualPct - rule.targetPct;
    const overTol = Math.abs(diff) > rule.tolerance;
    const accName = rule.type === 'account' ? (STATE.accounts.find(a => a.id === rule.target)?.name || rule.target) : rule.target;
    return { name: accName, type: rule.type, targetPct: rule.targetPct, actualPct, diff, overTol, tolerance: rule.tolerance };
  });

  const maxScale = Math.max(50, ...items.map(i => Math.max(i.targetPct, i.actualPct) * 1.2));

  return items.map(item => {
    const targetW = (item.targetPct / maxScale) * 100;
    const actualW = (item.actualPct / maxScale) * 100;
    const tolLow = ((item.targetPct - item.tolerance) / maxScale) * 100;
    const tolHi = ((item.targetPct + item.tolerance) / maxScale) * 100;
    const typeIcon = item.type === 'sector' ? '🏭' : item.type === 'account' ? '🏦' : '📈';
    const barColor = item.overTol ? 'var(--red)' : 'var(--green)';
    return `
      <div style="margin-bottom:14px">
        <div class="flex-between" style="margin-bottom:4px;font-size:12px">
          <span><span style="margin-right:4px">${typeIcon}</span><strong>${item.name}</strong></span>
          <span class="text-mono ${item.overTol ? 'text-red' : 'text-green'}">${fmtPct(item.actualPct)} <span class="text-muted">/ ${fmtPct(item.targetPct)} (${fmtPct(item.diff, true)})</span></span>
        </div>
        <div style="position:relative;height:18px;background:var(--bg-primary);border-radius:4px;overflow:hidden">
          <!-- Tolerance band -->
          <div style="position:absolute;left:${tolLow}%;width:${tolHi - tolLow}%;height:100%;background:rgba(22,163,74,0.15)"></div>
          <!-- Target marker -->
          <div style="position:absolute;left:${targetW}%;width:2px;height:100%;background:var(--text-secondary);z-index:2"></div>
          <!-- Actual bar -->
          <div style="position:absolute;left:0;width:${actualW}%;height:100%;background:${barColor};opacity:0.7;border-radius:4px;transition:width 0.5s"></div>
        </div>
      </div>
    `;
  }).join('');
}

// Sparkline (mini line chart for stat cards)
function renderSparkline(data, opts = {}) {
  const { width = 100, height = 30, color = 'var(--accent)' } = opts;
  if (data.length < 2) return '';
  const ys = data.map(d => d.y);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const range = (yMax - yMin) || 1;
  const points = data.map((d, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((d.y - yMin) / range) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lastY = ys[ys.length - 1], firstY = ys[0];
  const trendColor = lastY >= firstY ? 'var(--green)' : 'var(--red)';
  return `<svg width="${width}" height="${height}" style="display:block">
    <polyline points="${points}" fill="none" stroke="${trendColor}" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}

// ============================================================
// TAB 1: DASHBOARD (Graph-Centric)
// ============================================================
function renderDashboard() {
  // 사람별 필터 적용
  const filteredAccs = getFilteredAccounts();
  const filteredHoldings = getFilteredHoldings();
  const total = totalAssetsFiltered();
  const ownerLabel = STATE.currentOwnerFilter === 'all' ? '전체' : STATE.currentOwnerFilter;

  // 자산 추이는 owner 필터 시 비례 환산 (전체 스냅샷의 일부분으로 가정)
  const totalAll = totalAssets();
  const ratio = totalAll > 0 ? total / totalAll : 1;
  const change1d = getChangeRate(totalAll, 1);
  const change7d = getChangeRate(totalAll, 7);
  const change30d = getChangeRate(totalAll, 30);

  // Account distribution (필터된 계좌만)
  const accountDist = filteredAccs.map(acc => {
    const accValue = (acc.cash || 0) + filteredHoldings
      .filter(h => h.accountId === acc.id)
      .reduce((s, h) => s + (getCurrentValue(h) || 0), 0);
    return { label: `${acc.name} (${acc.type})`, value: accValue };
  }).filter(d => d.value > 0);

  // Sector distribution (필터된 holdings만)
  const sectorMap = {};
  filteredHoldings.forEach(h => {
    const v = getCurrentValue(h);
    if (v == null) return;
    const sector = STATE.metricsCache[h.ticker]?.sector || h.sector || '미분류';
    sectorMap[sector] = (sectorMap[sector] || 0) + v;
  });
  const sectorDist = Object.entries(sectorMap).map(([k, v]) => ({ label: k, value: v }));

  // Account type distribution (필터된 계좌만)
  const typeMap = {};
  filteredAccs.forEach(acc => {
    const accValue = (acc.cash || 0) + filteredHoldings.filter(h => h.accountId === acc.id).reduce((s, h) => s + (getCurrentValue(h) || 0), 0);
    typeMap[acc.type] = (typeMap[acc.type] || 0) + accValue;
  });
  const typeDist = Object.entries(typeMap).map(([k, v]) => ({ label: k, value: v }));

  // Asset trend data — period selectable (1M/3M/6M/1Y/ALL)
  const rangeMap = { '1M': 30, '3M': 90, '6M': 180, '1Y': 365, 'ALL': Infinity };
  const days = rangeMap[STATE.currentTrendRange] || 30;
  const sortedSnaps = [...STATE.snapshots].sort((a, b) => new Date(a.date) - new Date(b.date));
  const slicedSnaps = days === Infinity ? sortedSnaps : sortedSnaps.slice(-days);
  // Each snapshot multiplied by current owner ratio (전체 자산 대비 필터된 비율)
  // 마지막 포인트는 실제 필터된 total 사용 (오늘은 정확하게)
  const trendData = slicedSnaps.map((s, i) => ({
    x: i,
    y: s.total * ratio,
    label: new Date(s.date).toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' }),
  }));
  // 마지막 스냅샷이 오늘 자정 기준이면 실제 total로 업데이트, 아니면 새 점 추가
  if (total > 0 && trendData.length > 0) {
    const lastDate = slicedSnaps[slicedSnaps.length - 1].date;
    const todayStr = new Date().toISOString().slice(0, 10);
    if (lastDate === todayStr) {
      trendData[trendData.length - 1].y = total;
      trendData[trendData.length - 1].label = '현재';
    } else {
      trendData.push({ x: trendData.length, y: total, label: '현재' });
    }
  }

  // Sparkline for total assets card
  const sparklineHtml = trendData.length >= 2 ? renderSparkline(trendData) : '';

  // Rebalancing alerts (전체 기준 - 필터 무관)
  const alerts = checkRebalanceAlerts();

  // Sell signals (필터된 holdings만)

  // Buy signals (관심종목 목표 매수가 도달 - owner 필터 무관)

        const ownerType = ownerAccs[0]?.type || '';
        const ownerTotal = ownerAccs.reduce((s, acc) => {
          return s + (acc.cash || 0) + STATE.holdings.filter(h => h.accountId === acc.id).reduce((sub, h) => sub + (getCurrentValue(h) || 0), 0);
        }, 0);
        const icon = ownerType === '본인' ? '👤' : ownerType === '자녀' ? '👶' : ownerType === '회사' ? '🏢' : ownerType === '배우자' ? '💑' : '👤';
        return `<button class="owner-tab ${STATE.currentOwnerFilter === owner ? 'active' : ''}" onclick="setOwnerFilter('${owner.replace(/'/g, "\\'")}')">
          ${icon} ${owner}
          <span class="owner-tab-amount">${fmtKRW(ownerTotal)}</span>
        </button>`;
      }).join('')}
    </div>
  `;

    <div class="flex-between mb-16">
      <h2 class="section-title"><span class="section-title-bar"></span>대시보드 ${STATE.currentOwnerFilter !== 'all' ? `<span class="text-muted" style="font-size:14px;font-weight:400">— ${ownerLabel}</span>` : ''}</h2>

function checkRebalanceAlerts() {
  const alerts = [];
  if (!STATE.allocationRules.length) return alerts;
  const total = totalAssets();
  if (!total) return alerts;
  STATE.allocationRules.forEach(rule => {
    let actual = 0;
    let displayName = rule.target;
    if (rule.type === 'sector') {
      STATE.holdings.forEach(h => {
        const sec = STATE.metricsCache[h.ticker]?.sector || h.sector;
        if (sec === rule.target) actual += getCurrentValue(h) || 0;
      });
    } else if (rule.type === 'account') {
      const acc = STATE.accounts.find(a => a.id === rule.target);
      if (acc) {
        actual = (acc.cash || 0) + STATE.holdings.filter(h => h.accountId === acc.id).reduce((s, h) => s + (getCurrentValue(h) || 0), 0);
        displayName = acc.name;
      }
    } else if (rule.type === 'ticker') {
      STATE.holdings.forEach(h => { if (h.ticker === rule.target) actual += getCurrentValue(h) || 0; });
    }
    const actualPct = (actual / total) * 100;
    const diff = actualPct - rule.targetPct;
    if (Math.abs(diff) > rule.tolerance) {
      // 알림 ID: 룰 ID + 편차값 (소수점 1자리). 편차가 다시 변하면 새 ID로 재출현
      const id = `rebalance|${rule.id}|${diff.toFixed(1)}`;
      alerts.push({
        id,
        type: 'rebalance',
        title: displayName,
        summary: `${displayName} ${fmtPct(diff, true)}`,
        message: `${displayName} 비중 ${fmtPct(actualPct)} (목표 ${fmtPct(rule.targetPct)}, 편차 ${fmtPct(diff, true)})`,
        rule, actualPct, diff
      });
    }
  });
  return alerts.filter(a => !STATE.dismissedAlerts.includes(a.id));
}

function checkSellSignals() {
  const signals = [];
  STATE.holdings.forEach(h => {
    const price = STATE.priceCache[h.ticker]?.price;
    if (!price) return;
    const name = h.name || h.ticker;
    if (h.targetPrice && price >= h.targetPrice) {
      // 알림 ID: 종목 + 가격 정수부 (가격이 변하면 새 알림)
      const id = `sell|target|${h.id}|${Math.floor(price)}`;
      signals.push({ id, ticker: name, type: 'target', price, target: h.targetPrice, rate: ((price - h.avgPrice) / h.avgPrice * 100) });
    } else if (h.stopPrice && price <= h.stopPrice) {
      const id = `sell|stop|${h.id}|${Math.floor(price)}`;
      signals.push({ id, ticker: name, type: 'stop', price, target: h.stopPrice, rate: ((price - h.avgPrice) / h.avgPrice * 100) });
    }
  });
  return signals.filter(s => !STATE.dismissedAlerts.includes(s.id));
}

// 관심종목의 목표 매수가 도달 체크
function checkBuySignals() {
  const signals = [];
  STATE.watchlist.forEach(w => {
    if (!w.buyTargetPrice) return;
    const price = STATE.priceCache[w.ticker]?.price;
    if (!price) return;
    if (price <= w.buyTargetPrice) {
      const id = `buy|target|${w.id}|${Math.floor(price)}`;
      signals.push({
        id,
        ticker: w.name || w.ticker,
        type: 'buy',
        price,
        target: w.buyTargetPrice,
        diff: ((price - w.buyTargetPrice) / w.buyTargetPrice * 100),
      });
    }
  });
  return signals.filter(s => !STATE.dismissedAlerts.includes(s.id));
}

function dismissAlert(id) {
  if (!STATE.dismissedAlerts.includes(id)) {
    STATE.dismissedAlerts.push(id);
    // 너무 쌓이지 않도록 최대 200개 유지
    if (STATE.dismissedAlerts.length > 200) {
      STATE.dismissedAlerts = STATE.dismissedAlerts.slice(-200);
    }
    saveLocal();
  }
  renderTab('dashboard');
}

function clearAllAlerts(ids) {
  ids.forEach(id => {

  STATE.dismissedAlerts = STATE.dismissedAlerts.slice(-200);
  saveLocal();
  renderTab('dashboard');

// Fetch historical chart for benchmark comparison
async function fetchHistoricalChart(ticker, range = '1mo') {
  const proxy = STATE.settings.proxyUrl;
  if (!proxy) throw new Error('프록시 URL이 설정되지 않음');
  const url = `${proxy}/yahoo/chart/${encodeURIComponent(ticker)}?range=${range}&interval=1d`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('차트 조회 실패: ' + ticker);
  const data = await res.json();
  const result = data.chart?.result?.[0];
  if (!result) return [];
  const timestamps = result.timestamp || [];
  const closes = result.indicators?.quote?.[0]?.close || [];
  return timestamps.map((t, i) => ({
    x: i,
    y: closes[i],
    label: new Date(t * 1000).toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' }),
  })).filter(d => d.y != null);
}

function saveAccount(id) {
  const name = $('#m_accName').value.trim();
  if (!name) { showStatus('계좌명을 입력하세요', 'error'); return; }
  const data = {
    id: id || ('acc_' + Date.now()),
    name,
    type: $('#m_accType').value,
    owner: $('#m_accOwner').value.trim(),
    broker: $('#m_accBroker').value.trim(),
    cash: parseFloat($('#m_accCash').value) || 0,
  };
  if (id) {
    const i = STATE.accounts.findIndex(a => a.id === id);
    STATE.accounts[i] = data;
  } else {
    STATE.accounts.push(data);
  }
  saveLocal();
  closeModal();
  renderTab('accounts');
  showStatus('✓ 계좌 저장됨', 'success');
}

function deleteAccount(id) {
  const acc = STATE.accounts.find(a => a.id === id);
  if (!acc) return;
  const holdings = STATE.holdings.filter(h => h.accountId === id);
  if (holdings.length) {
    if (!confirm(`이 계좌에는 ${holdings.length}개 보유 종목이 있습니다. 모두 삭제됩니다. 진행할까요?`)) return;
  } else {
    if (!confirm(`'${acc.name}' 계좌를 삭제할까요?`)) return;
  }
  STATE.accounts = STATE.accounts.filter(a => a.id !== id);
  STATE.holdings = STATE.holdings.filter(h => h.accountId !== id);
  saveLocal();
  renderTab('accounts');
  showStatus('✓ 삭제 완료', 'success');
}

function renderPortfolio() {
  const filterAccId = STATE.currentAccountFilter;
  const holdings = STATE.holdings.filter(h => filterAccId === 'all' || h.accountId === filterAccId);
  const total = totalAssets();

  // 자산 배분 룰 행 렌더링 (요약 게이지 + 표 정보)
  const allocRows = STATE.allocationRules.map(rule => {
    let actual = 0;
    if (rule.type === 'sector') {
      STATE.holdings.forEach(h => {
        const sec = STATE.metricsCache[h.ticker]?.sector || h.sector;
        if (sec === rule.target) actual += getCurrentValue(h) || 0;
      });
    } else if (rule.type === 'account') {
      const acc = STATE.accounts.find(a => a.id === rule.target);
      if (acc) actual = (acc.cash || 0) + STATE.holdings.filter(h => h.accountId === acc.id).reduce((s, h) => s + (getCurrentValue(h) || 0), 0);
    } else if (rule.type === 'ticker') {
      STATE.holdings.forEach(h => { if (h.ticker === rule.target) actual += getCurrentValue(h) || 0; });
    }
    const actualPct = total > 0 ? (actual / total) * 100 : 0;
    const diff = actualPct - rule.targetPct;
    const overTol = Math.abs(diff) > rule.tolerance;
    const targetVal = total * rule.targetPct / 100;
    const adjustVal = targetVal - actual;
    const targetName = rule.type === 'account' ? (STATE.accounts.find(a => a.id === rule.target)?.name || rule.target) : rule.target;

    const typeText = rule.type === 'sector' ? '산업' : rule.type === 'account' ? '계좌' : '종목';

    return { rule, actualPct, diff, overTol, adjustVal, targetName, typeIcon, typeBadge, typeText };
  });

      <textarea class="form-input text" id="m_thesis" rows="3" style="font-family:var(--font-body)">${h.thesis || ''}</textarea>

      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveHolding('${id || ''}')">저장 & 시세 조회</button>
    </div>
  `);
}

async function saveHolding(id) {
  const ticker = $('#m_ticker').value.trim();
  if (!ticker) { showStatus('티커를 입력하세요', 'error'); return; }

  const data = {
    id: id || ('hld_' + Date.now()),
    ticker,
    name: $('#m_name').value.trim(),
    accountId: $('#m_account').value,
    sector: $('#m_sector').value.trim(),
    quantity: parseFloat($('#m_qty').value) || 0,
    avgPrice: parseFloat($('#m_avgPrice').value) || 0,
    targetPrice: parseFloat($('#m_target').value) || null,
    stopPrice: parseFloat($('#m_stop').value) || null,
    thesis: $('#m_thesis').value.trim(),
    addedAt: new Date().toISOString(),
  };

  // Try to fetch metrics for sector autofill
  try {
    showStatus('📊 시세/지표 조회 중...', 'info', false);
    const [price, metrics] = await Promise.all([
      fetchPrice(ticker).catch(() => null),
      fetchMetrics(ticker).catch(() => null),
    ]);
    if (metrics) {
      if (!data.name) data.name = metrics.name;
      if (!data.sector) data.sector = metrics.sector;
    }
  } catch (e) { console.warn(e); }

  if (id) {
    const i = STATE.holdings.findIndex(h => h.id === id);
    STATE.holdings[i] = data;
  } else {
    STATE.holdings.push(data);
  }
  saveLocal();
  closeModal();
  renderTab('portfolio');
  showStatus('✓ 종목 저장됨', 'success');
}

function deleteHolding(id) {
  if (!confirm('이 보유 종목을 삭제할까요?')) return;
  STATE.holdings = STATE.holdings.filter(h => h.id !== id);
  saveLocal();
  renderTab('portfolio');
  showStatus('✓ 삭제 완료', 'success');
}

function openAllocationModal(id = null) {
  const rule = id ? STATE.allocationRules.find(r => r.id === id) : { type: 'sector', targetPct: 20, tolerance: 5 };
  if (!rule) return;
  // Get available targets per type
  const sectors = [...new Set(STATE.holdings.map(h => STATE.metricsCache[h.ticker]?.sector || h.sector).filter(Boolean))];
  const tickers = [...new Set(STATE.holdings.map(h => h.ticker))];

  openModal(`
    <div class="modal-header">
      <div class="modal-title">${id ? '룰 수정' : '자산 배분 룰 추가'}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">유형</label>
      <select class="form-select" id="m_ruleType" onchange="updateAllocTargetField()">
        <option value="sector" ${rule.type === 'sector' ? 'selected' : ''}>산업/섹터별</option>
        <option value="ticker" ${rule.type === 'ticker' ? 'selected' : ''}>개별 종목</option>

      </select>
    </div>
    <div class="form-group">
      <label class="form-label">대상</label>
      <div id="m_targetField"></div>
    </div>
    <div class="grid grid-2">
      <div class="form-group">
        <label class="form-label">목표 비중 (%)</label>
        <input class="form-input" id="m_targetPct" type="number" step="0.1" value="${rule.targetPct}">
      </div>
      <div class="form-group">
        <label class="form-label">허용 편차 (±%)</label>
        <input class="form-input" id="m_tolerance" type="number" step="0.1" value="${rule.tolerance}">
      </div>
    </div>
    <div class="flex-end">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveAllocation('${id || ''}')">저장</button>
    </div>
  `);
  // Initialize target field
  window._allocRuleEditing = rule;
  window._allocSectors = sectors;
  window._allocTickers = tickers;
  updateAllocTargetField();
}

function updateAllocTargetField() {
  const type = $('#m_ruleType').value;
  const rule = window._allocRuleEditing || {};
  const field = $('#m_targetField');
  if (type === 'sector') {
    const sectors = window._allocSectors || [];
    field.innerHTML = `<input class="form-input text" id="m_targetVal" list="sectorList" value="${rule.target || ''}" placeholder="예: Technology">
      <datalist id="sectorList">${sectors.map(s => `<option value="${s}">`).join('')}</datalist>`;
  } else if (type === 'ticker') {
    const tickers = window._allocTickers || [];
    field.innerHTML = `<select class="form-select" id="m_targetVal">${tickers.map(t => `<option value="${t}" ${rule.target === t ? 'selected' : ''}>${t}</option>`).join('')}</select>`;
  } else {
    field.innerHTML = `<select class="form-select" id="m_targetVal">${STATE.accounts.map(a => `<option value="${a.id}" ${rule.target === a.id ? 'selected' : ''}>${a.name} (${a.type})</option>`).join('')}</select>`;
  }
}

function saveAllocation(id) {
  const data = {
    id: id || ('alc_' + Date.now()),
    type: $('#m_ruleType').value,
    target: $('#m_targetVal').value.trim(),
    targetPct: parseFloat($('#m_targetPct').value) || 0,
    tolerance: parseFloat($('#m_tolerance').value) || 5,
  };
  if (!data.target) { showStatus('대상을 지정하세요', 'error'); return; }
  if (id) {
    const i = STATE.allocationRules.findIndex(r => r.id === id);
    STATE.allocationRules[i] = data;
  } else {
    STATE.allocationRules.push(data);
  }
  saveLocal();
  closeModal();
  renderTab('portfolio');
  showStatus('✓ 룰 저장됨', 'success');
}

function deleteAllocation(id) {
  if (!confirm('이 룰을 삭제할까요?')) return;
  STATE.allocationRules = STATE.allocationRules.filter(r => r.id !== id);
  saveLocal();
  renderTab('portfolio');
}

// ============================================================
function renderQuant() {
  // status 기본값: 'review' (검토중)
  const STATUS_META = {
    review:    { label: '검토 중',    icon: '🟢', cls: 'status-review' },
    watching:  { label: '모니터링',   icon: '🟡', cls: 'status-watching' },
    interest:  { label: '관심',       icon: '🔵', cls: 'status-interest' },
  };

  const filter = STATE.watchlistStatusFilter || 'all';
  const all = STATE.watchlist;
  // status 별 카운트
  const counts = {
    all: all.length,
    review: all.filter(w => (w.status || 'review') === 'review').length,
    watching: all.filter(w => w.status === 'watching').length,
    interest: all.filter(w => w.status === 'interest').length,
  };

  let filteredList = filter === 'all' ? all : all.filter(w => (w.status || 'review') === filter);
  // 정렬: status별 정렬 키, 그 다음 F-Score 내림차순
  const statusOrder = { review: 0, watching: 1, interest: 2 };
  filteredList = [...filteredList].sort((a, b) => {
    const sa = statusOrder[a.status || 'review'] ?? 99;
    const sb = statusOrder[b.status || 'review'] ?? 99;
    if (sa !== sb) return sa - sb;
    return (b.fScore || 0) - (a.fScore || 0);
  });

  // 카드 렌더
  const watchlistCards = filteredList.length === 0 ? `
    <div class="watchlist-empty">
      <span class="text-muted" style="font-size:12px">${filter === 'all' ? '★ 매수 후보 없음 — 우측의 "+ 종목 추가" 또는 아래 "분석 실행" 후 등록' : '이 상태의 종목이 없습니다'}</span>
    </div>
  ` : `
    <div class="watchlist-grid">
      ${filteredList.map(w => {
        const p = STATE.priceCache[w.ticker];
        const change = p ? ((p.price - p.prevClose) / p.prevClose * 100) : null;
        const cls = getScoreClass(w.fScore || 0, 9);
        const status = w.status || 'review';
        const meta = STATUS_META[status] || STATUS_META.review;
        // 목표 매수가 도달률
        let buyTargetInfo = '';
        if (w.buyTargetPrice && p) {
          const diff = ((p.price - w.buyTargetPrice) / w.buyTargetPrice * 100);
          const reached = p.price <= w.buyTargetPrice;
          buyTargetInfo = `<div class="watchlist-buytarget ${reached ? 'reached' : ''}">
            🎯 목표 ${fmtNum(w.buyTargetPrice, 0)} <span class="${reached ? 'text-green' : 'text-muted'}">(${reached ? '도달!' : fmtPct(diff, true) + ' 차이'})</span>
          </div>`;
        }
        return `<div class="watchlist-card" onclick="loadWatchlistAnalysis('${w.ticker}')">
          <div class="watchlist-card-head">
            <div class="watchlist-name">${w.name || w.ticker}</div>
            <div class="watchlist-card-actions">
              <button class="watchlist-edit" onclick="event.stopPropagation();openWatchlistEditModal('${w.id}')" title="편집">✎</button>
              <button class="watchlist-remove" onclick="event.stopPropagation();removeWatchlist('${w.id}')" title="제거">✕</button>
            </div>
          </div>
          <div class="watchlist-ticker text-muted">${w.ticker} · ${w.sector || '—'}</div>
          <div class="watchlist-status-row">
            <span class="watchlist-status-badge ${meta.cls}">${meta.icon} ${meta.label}</span>
            ${w.fScore != null ? `<span class="watchlist-score-num ${cls}" style="font-size:14px">${w.fScore}<span class="watchlist-score-max">/9</span></span>` : '<span class="text-muted" style="font-size:10px">미분석</span>'}
          </div>
          <div class="watchlist-score">
            ${p ? `<span class="watchlist-price">${fmtNum(p.price, 0)}</span>
            <span class="watchlist-change ${change > 0 ? 'text-green' : change < 0 ? 'text-red' : 'text-muted'}">${change != null ? fmtPct(change, true) : ''}</span>` : '<span class="text-muted" style="font-size:11px">시세 없음</span>'}
          </div>
          ${buyTargetInfo}
          ${w.memo ? `<div class="watchlist-memo text-muted">${w.memo}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  `;

  $('#tab-quant').innerHTML = `
    <div class="flex-between mb-16">
      <h2 class="section-title"><span class="section-title-bar"></span>퀀트 분석</h2>
      <div class="flex flex-gap">
        <button class="btn btn-primary btn-sm" onclick="openWatchlistEditModal()">+ 종목 추가</button>
        <button class="btn btn-sm" onclick="refreshWatchlist()">↻ 시세 갱신</button>
      </div>
    </div>

    <!-- ===== SECTION 1: 매수 후보 / 관심 종목 ===== -->
    <div class="card mb-16">
      <div class="flex-between mb-12">
        <h3 class="card-title" style="margin:0">★ 관심 종목 ${all.length ? `<span class="text-muted" style="font-size:12px;font-weight:400">(${all.length}개)</span>` : ''}</h3>
        <div class="watchlist-status-filter">
          <button class="ws-filter-btn ${filter === 'all' ? 'active' : ''}" onclick="setWatchlistFilter('all')">전체 ${counts.all}</button>
          <button class="ws-filter-btn ${filter === 'review' ? 'active' : ''}" onclick="setWatchlistFilter('review')">🟢 검토 ${counts.review}</button>
          <button class="ws-filter-btn ${filter === 'watching' ? 'active' : ''}" onclick="setWatchlistFilter('watching')">🟡 모니터 ${counts.watching}</button>
          <button class="ws-filter-btn ${filter === 'interest' ? 'active' : ''}" onclick="setWatchlistFilter('interest')">🔵 관심 ${counts.interest}</button>
        </div>
      </div>
      ${watchlistCards}
      ${filteredList.length ? '<div class="text-muted mt-12" style="font-size:11px">💡 카드 클릭 → 아래에 자동 재분석 / ✎ → 편집 (상태/목표가/메모) / ✕ → 제거</div>' : ''}
    </div>

    <!-- ===== SECTION 2: 종목 분석 ===== -->
    <div class="card">
      <h3 class="card-title">🔍 종목 분석</h3>
      <div class="grid grid-3" style="gap:12px;align-items:end">
        <div class="form-group" style="margin:0">
          <label class="form-label">티커 입력 (예: 005930.KS, AAPL)</label>
          <input class="form-input" id="quantTicker" placeholder="ticker..." onkeydown="if(event.key==='Enter') runQuantAnalysis()">

function loadWatchlistAnalysis(ticker) {
  const tickerInput = document.getElementById('quantTicker');
  if (tickerInput) {
    tickerInput.value = ticker;
    runQuantAnalysis();
    // 분석 영역으로 부드럽게 스크롤
    setTimeout(() => {
      const result = document.getElementById('quantResult');
      if (result) result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);
  }
}

async function runQuantAnalysis() {
  const ticker = $('#quantTicker').value.trim();
  if (!ticker) { showStatus('티커를 입력하세요', 'error'); return; }
  const customCompare = $('#quantCompare').value.split(',').map(s => s.trim()).filter(Boolean);

  const result = $('#quantResult');
  result.innerHTML = '<div class="card"><div class="text-center text-muted">분석 중...</div></div>';

  try {
    const [price, metrics] = await Promise.all([fetchPrice(ticker), fetchMetrics(ticker)]);
    const fScore = calcFScore(metrics);

    // Try to fetch comparisons
    let industryPeers = [];
    let customComparisons = [];

    // Use stored peers for the same industry from previous analyses if available
    Object.values(STATE.metricsCache).forEach(m => {
      if (m.ticker !== ticker && m.industry && m.industry === metrics.industry) {
        industryPeers.push(m);
      }
    });

    if (customCompare.length) {
      const results = await Promise.allSettled(customCompare.map(t => fetchMetrics(t)));
      customComparisons = results.filter(r => r.status === 'fulfilled').map(r => r.value);
    }

    renderQuantResult({ ticker, price, metrics, fScore, industryPeers, customComparisons });
  } catch (e) {
    result.innerHTML = `<div class="card"><div class="alert danger">⚠ ${e.message}</div></div>`;
  }
}

function renderQuantResult({ ticker, price, metrics, fScore, industryPeers, customComparisons }) {
  // Calculate industry averages
  const indAvg = industryPeers.length ? {
    per: avg(industryPeers.map(p => p.per)),
    pbr: avg(industryPeers.map(p => p.pbr)),
    roe: avg(industryPeers.map(p => p.roe)),
    debtToEquity: avg(industryPeers.map(p => p.debtToEquity)),
    operatingMargin: avg(industryPeers.map(p => p.operatingMargin)),
  } : null;

  // Custom comparison averages
  const customAvg = customComparisons.length ? {
    per: avg(customComparisons.map(p => p.per)),
    pbr: avg(customComparisons.map(p => p.pbr)),
    roe: avg(customComparisons.map(p => p.roe)),
    debtToEquity: avg(customComparisons.map(p => p.debtToEquity)),
    operatingMargin: avg(customComparisons.map(p => p.operatingMargin)),
  } : null;

  // Verdict: combine PER vs averages + F-Score
  function valuationVerdict(my, avg, lowerIsBetter = true) {
    if (avg == null || my == null) return null;
    const diff = (my - avg) / avg * 100;
    if (lowerIsBetter) {
      if (diff < -15) return { label: '저평가', cls: 'badge-green', diff };
      if (diff > 15) return { label: '고평가', cls: 'badge-red', diff };
      return { label: '적정', cls: 'badge-yellow', diff };
    } else {
      if (diff > 15) return { label: '우위', cls: 'badge-green', diff };
      if (diff < -15) return { label: '열위', cls: 'badge-red', diff };
      return { label: '평이', cls: 'badge-yellow', diff };
    }
  }

  function compareRow(label, mine, indVal, customVal, lowerIsBetter, fmt = (v) => fmtNum(v, 2)) {
    const v1 = valuationVerdict(mine, indVal, lowerIsBetter);
    const v2 = valuationVerdict(mine, customVal, lowerIsBetter);
    return `<tr>
      <td class="text-cell"><strong>${label}</strong></td>
      <td class="num-cell">${mine != null ? fmt(mine) : '—'}</td>
      <td class="num-cell">${indVal != null ? fmt(indVal) : '—'} ${v1 ? `<span class="badge ${v1.cls}">${v1.label}</span>` : ''}</td>
      <td class="num-cell">${customVal != null ? fmt(customVal) : '—'} ${v2 ? `<span class="badge ${v2.cls}">${v2.label}</span>` : ''}</td>

  const fScoreCls = getScoreClass(fScore.score, 9);

  $('#quantResult').innerHTML = `
    <div class="card">
      <div class="flex-between mb-16">
        <div>
          <h3 class="card-title" style="margin:0">${metrics.name} <span class="text-muted" style="font-size:13px">(${ticker})</span></h3>
          <div class="text-secondary" style="font-size:12px">${metrics.sector} · ${metrics.industry} · ${metrics.country}</div>
        </div>
        <button class="btn btn-success" onclick='addToWatchlist(${JSON.stringify({ticker, name: metrics.name, fScore: fScore.score, sector: metrics.sector}).replace(/'/g, "&apos;")})'>★ 매수후보 등록</button>
      </div>

      <div class="grid grid-4">
        <div class="stat-card">
          <div class="stat-label">현재가</div>
          <div class="stat-value">${fmtNum(price.price, 2)}</div>
          <div class="stat-change flat">${price.currency || ''}</div>
        </div>
        <div class="stat-card ${(price.price - price.prevClose) > 0 ? 'green' : 'red'}">
          <div class="stat-label">전일 대비</div>
          <div class="stat-value ${(price.price - price.prevClose) > 0 ? 'text-green' : 'text-red'}">${fmtPct((price.price - price.prevClose) / price.prevClose * 100, true)}</div>
          <div class="stat-change flat">${fmtNum(price.price - price.prevClose, 2)}</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-label">시가총액</div>
          <div class="stat-value">${metrics.marketCap ? fmtNum(metrics.marketCap / 1e12, 2) + '조' : '—'}</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-label">배당수익률</div>
          <div class="stat-value">${metrics.dividendYield ? fmtPct(metrics.dividendYield * 100) : '—'}</div>
        </div>
      </div>
    </div>

    <div class="grid grid-2 mt-16">
      <div class="card">
        <h3 class="card-title">📊 Piotroski F-Score</h3>
        <div class="flex flex-gap" style="align-items:center">
          <div class="score-circle ${fScoreCls}">
            <div class="score-num">${fScore.score}</div>
            <div class="score-label">/ 9</div>
          </div>
          <div>
            <div style="font-size:18px;font-weight:600" class="${fScoreCls === 'high' ? 'text-green' : fScoreCls === 'mid' ? '' : 'text-red'}">${fScoreLabel}</div>
            <div class="text-secondary" style="font-size:12px">9개 재무 건전성 지표 통과 개수</div>
          </div>
        </div>
        <div class="mt-16" style="font-size:12px">
          ${fScore.checks.map(c => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">

        </div>
      </div>

      <div class="card">
        <h3 class="card-title">💰 손익비 시뮬레이션</h3>
        <div class="grid grid-2">

        💡 <strong>산업 평균</strong>은 이전에 분석한 같은 산업 종목 ${industryPeers.length}개 평균 (퀀트 분석 화면에서 종목들을 더 분석할수록 정확해집니다).<br>
        💡 <strong>사용자 비교</strong>는 직접 입력한 ${customComparisons.length}개 종목 평균.
      </div>

function avg(arr) {
  const valid = arr.filter(v => v != null && !isNaN(v));
  if (!valid.length) return null;
  return valid.reduce((s, v) => s + v, 0) / valid.length;
}

function calcSimulation(currentPrice, ticker) {
  const target = parseFloat($('#simTarget').value);
  const stop = parseFloat($('#simStop').value);
  if (!target || !stop) { showStatus('값을 입력하세요', 'error'); return; }
  const profitPct = (target - currentPrice) / currentPrice * 100;
  const lossPct = (currentPrice - stop) / currentPrice * 100;
  const ratio = lossPct > 0 ? profitPct / lossPct : 0;
  const taxRate = getTaxRate(ticker);
  const fee = STATE.settings.feeRate;
  const afterTaxProfit = profitPct * (1 - taxRate) - fee * 100;

  $('#simResult').innerHTML = `
    <div class="grid grid-3" style="gap:8px">
      <div>
        <div class="text-secondary" style="font-size:11px">예상 수익률</div>
        <div class="text-mono text-green" style="font-size:18px;font-weight:600">${fmtPct(profitPct, true)}</div>
      </div>
      <div>
        <div class="text-secondary" style="font-size:11px">예상 손실률</div>
        <div class="text-mono text-red" style="font-size:18px;font-weight:600">-${fmtPct(lossPct)}</div>
      </div>
      <div>
        <div class="text-secondary" style="font-size:11px">손익비</div>
        <div class="text-mono" style="font-size:18px;font-weight:600;color:${ratio >= 2 ? 'var(--green)' : ratio >= 1 ? 'var(--yellow)' : 'var(--red)'}">1 : ${fmtNum(ratio, 2)}</div>
      </div>
    </div>
    <div class="alert ${ratio >= 2 ? 'success' : ratio >= 1 ? 'warning' : 'danger'} mt-12">
      ${ratio >= 2 ? '✓ 손익비 양호 (1:2 이상)' : ratio >= 1 ? '△ 손익비 보통' : '✗ 손익비 불리 — 진입 비추천'}
      · 세후 수익률 (양도세 ${fmtPct(taxRate * 100)} 반영): <strong>${fmtPct(afterTaxProfit, true)}</strong>
    </div>
  `;
}

function addToWatchlist(data) {
  const exists = STATE.watchlist.find(w => w.ticker === data.ticker);
  if (exists) { showStatus('이미 매수후보에 있습니다', 'info'); return; }
  STATE.watchlist.push({
    id: 'wl_' + Date.now(),
    ticker: data.ticker,
    name: data.name,
    fScore: data.fScore,
    sector: data.sector,
    status: 'review',          // 분석 후 등록되는 종목은 기본 "검토 중"
    buyTargetPrice: null,
    addedAt: new Date().toISOString(),
    memo: '',
  });
  saveLocal();
  showStatus('✓ 매수후보 추가됨 (위 카드에서 확인)', 'success');
  // 위쪽 카드 그리드를 새로 그리되, 분석 결과(아래)는 유지하도록 부분 렌더링
  const lastTicker = document.getElementById('quantTicker')?.value;
  const lastCompare = document.getElementById('quantCompare')?.value;
  renderTab('quant');
  if (lastTicker) {
    document.getElementById('quantTicker').value = lastTicker;
    if (lastCompare) document.getElementById('quantCompare').value = lastCompare;
    runQuantAnalysis();
  }
}

async function saveWatchlistEdit(id) {
  const ticker = $('#wm_ticker').value.trim();
  if (!ticker) { showStatus('티커를 입력하세요', 'error'); return; }

  const status = document.querySelector('input[name="wm_status"]:checked')?.value || 'interest';
  const name = $('#wm_name').value.trim();
  const buyTarget = parseFloat($('#wm_buyTarget').value) || null;
  const memo = $('#wm_memo').value.trim();

  if (id) {
    // 편집
    const w = STATE.watchlist.find(x => x.id === id);
    if (!w) return;
    w.name = name || w.name;
    w.status = status;
    w.buyTargetPrice = buyTarget;
    w.memo = memo;
    saveLocal();
    closeModal();
    renderTab('quant');
    showStatus('✓ 저장됨', 'success');
    return;
  }

  // 새로 추가 — 중복 체크
  const exists = STATE.watchlist.find(w => w.ticker === ticker);
  if (exists) {
    showStatus('이미 등록된 종목입니다', 'error');
    return;
  }

  // 새 항목 추가
  const newItem = {
    id: 'wl_' + Date.now(),
    ticker,
    name: name || ticker,
    sector: '',
    fScore: null,
    status,
    buyTargetPrice: buyTarget,
    addedAt: new Date().toISOString(),
    memo,
  };
  STATE.watchlist.push(newItem);

  // 시세/지표 자동 조회 (실패해도 무시)
  showStatus('📊 시세/지표 조회 중...', 'info', false);
  try {
    const [price, metrics] = await Promise.all([
      fetchPrice(ticker).catch(() => null),
      fetchMetrics(ticker).catch(() => null),
    ]);
    if (metrics) {
      newItem.name = name || metrics.name;
      newItem.sector = metrics.sector;
      newItem.fScore = calcFScore(metrics).score;
    }
  } catch (e) { console.warn(e); }

  saveLocal();
  closeModal();
  renderTab('quant');
  showStatus('✓ 추가됨', 'success');
}
